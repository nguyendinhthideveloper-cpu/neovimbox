name: release-please

# From conventional commits (feat/fix/...) on main, release-please opens a "release PR"
# that gathers the CHANGELOG + bumps the version. Merging that PR creates a vX.Y.Z tag
# and a GitHub Release.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # config + manifest live at the repo root (release-please-config.json,
          # .release-please-manifest.json).
          token: ${{ secrets.GITHUB_TOKEN }}
